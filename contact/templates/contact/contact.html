<!DOCTYPE html>
<html dir="rtl" lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="Eduleb - Education HTML Template">
<meta name="keywords" content="agency, business, corporate, creative, html5, modern, multipurpose, One Page, parallax, startup">
<title>Eduleb - آموزش قالب HTML</title>
<link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{% static 'owlcarousel/css/owl.carousel.css' %}">
<link rel="stylesheet" href="{% static 'owlcarousel/css/owl.theme.css' %}">
<link rel="stylesheet" href="{% static 'css/jquery-simple-mobilemenu.css' %}">
<link rel="stylesheet" href="{% static 'css/magnific-popup.css' %}">
<link rel="stylesheet" href="{% static 'css/animate.css' %}">

</head>

<body data-spy="scroll" data-offset="80">
<div class="preloaders"><span class="loader"></span></div>

    {% include "header.html" %}

<section class="section-top"><div class="container"><div class="col-lg-10 offset-lg-1 text-center"><div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s" data-wow-offset="0">
<h1>در تماس باشید</h1>
<ul>
<li><a href="{% url 'home' %}">صفحه اصلی</a></li>
<li>/ Contact</li>
</ul>
</div></div></div></section>
<section class="address_area section-padding"><div class="container"><div class="row text-center">
<div class="col-lg-4 col-sm-4 col-xs-12 no-padding wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.1s" data-wow-offset="0"><div class="single_address sa_one">
<i class="ti-map"></i><h4>مکان ما</h4>
<p>3481 Melrose Place، بورلی هیلز<br>CA 90210</p>
</div></div>
<div class="col-lg-4 col-sm-4 col-xs-12 no-padding wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s" data-wow-offset="0"><div class="single_address sa_two">
<i class="ti-mobile"></i><h4>تلفن</h4>
<p>(+1) 517 397 7100</p>
<p>(+1) 411 315 8138</p>
</div></div>
<div class="col-lg-4 col-sm-4 col-xs-12 no-padding wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.3s" data-wow-offset="0"><div class="single_address sa_three">
<i class="ti-email"></i><h4>ایمیل بفرست</h4>
<p>info@example.com</p>
<p>admin@example.com</p>
</div></div>
</div></div></section><div id="contact" class="contact_area section-padding"><div class="container"><div class="row">
<div class="col-lg-7 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s" data-wow-offset="0"><div class="contact">
    <form class="form" name="enq" method="get" action=" {% url 'thankyou' %}" onsubmit="return validation();"><div class="row">
<div class="form-group col-md-6">
<label for="">نام</label><input type="text" name="name" class="form-control" required="required">
</div>
<div class="form-group col-md-6">
<label for="">ایمیل شما</label><input type="email" name="email" class="form-control" required="required">
</div>
<div class="form-group col-md-12">
<label for="">موضوع تو</label><input type="text" name="subject" class="form-control" required="required">
</div>
<div class="form-group col-md-12">
<label for="">پیغام تو</label><textarea rows="6" name="message" class="form-control" required="required"></textarea>
</div>
<div class="col-md-12 text-center"><button type="submit" value="Send message" name="submit" id="submitButton" class="btn_one" title="Submit Your Message!">پیام فرستادن</button></div>
</div></form></div></div>
<div class="col-lg-5 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s" data-wow-offset="0"><div class="map"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.957183635167!2d-74.00402768559431!3d40.71895904512855!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2598a1316e7a7%3A0x47bb20eb6074b3f0!2sNew%20Work%20City%20-%20(CLOSED)!5e0!3m2!1sbn!2sbd!4v1600305497356!5m2!1sbn!2sbd" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe></div></div>
</div></div></div>
